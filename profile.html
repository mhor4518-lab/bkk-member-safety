<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <title>Safety Leaderboard | TTSBKK</title>
  <style>
    body { font-family: 'Prompt', sans-serif; background: #f8f9fc; padding: 30px; }
    .header { background: #00429d; color: white; padding: 20px; border-radius: 15px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
    table { width: 100%; background: white; border-radius: 15px; border-collapse: collapse; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    th, td { padding: 15px 30px; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #fdfdfd; color: #888; font-size: 12px; text-transform: uppercase; }
    .score { font-weight: bold; color: #00429d; background: #eef4ff; padding: 5px 12px; border-radius: 20px; }
  </style>
</head>
<body>
  <div class="header">
    <div><h1>SAFETY LEADERBOARD</h1><p>TTSBKK E&I Section Dashboard</p></div>
    <button onclick="loadData()">🔄 Refresh</button>
  </div>
  <table>
    <thead><tr><th>อันดับ</th><th>พนักงาน</th><th>รหัส</th><th>คะแนนสะสม</th></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
  <script>
    const URL = "https://script.google.com/macros/s/AKfycbx_bFMVQG6pwTBE85V057Ho4NYEiE4wsYba_qEut4CkI4jerutaN_DmG-yIu2rvkW2vPg/exec";
    async function loadData() {
      const res = await fetch(URL, { method: 'POST', body: JSON.stringify({ action: 'getAllUsers' }) });
      const r = await res.json();
      const body = document.getElementById('tbody');
      body.innerHTML = "";
      r.data.forEach((u, i) => {
        body.innerHTML += `<tr><td>${i+1}</td><td>👤 ${u.name}</td><td>${u.empId}</td><td><span class="score">${u.score} Coins</span></td></tr>`;
      });
    }
    window.onload = loadData;
  </script>
</body>
</html>
