<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTSBKK Staff Identity</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00429d; --gold: #f1c40f; --bg: #f4f7f6; }
        body { font-family: 'Prompt', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .id-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 380px; margin: auto; }
        .header { background: var(--primary); padding: 50px 20px 70px; text-align: center; color: white; }
        .header h2 { margin: 0; font-size: 20px; letter-spacing: 1px; }
        .header p { margin: 5px 0 0; font-size: 10px; opacity: 0.8; }
        
        .profile-area { position: relative; width: 120px; height: 120px; margin: -60px auto 10px; }
        .img-box { width: 100%; height: 100%; border-radius: 50%; border: 5px solid white; background: #eee; overflow: hidden; cursor: pointer; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .cam-icon { position: absolute; bottom: 5px; right: 5px; background: var(--gold); border-radius: 50%; width: 30px; height: 30px; border: 2px solid white; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        
        .user-info { text-align: center; padding-bottom: 20px; }
        .user-info h3 { margin: 10px 0 5px; font-size: 22px; color: #333; }
        .user-info span { background: #eef2f7; padding: 4px 15px; border-radius: 15px; font-size: 13px; color: #666; }
        
        .stats { display: flex; border-top: 1px solid #eee; }
        .stat-item { flex: 1; padding: 15px; text-align: center; border-right: 1px solid #eee; }
        .stat-item:last-child { border-right: none; }
        .stat-label { font-size: 10px; color: #aaa; display: block; }
        .stat-val { font-size: 18px; font-weight: bold; color: var(--primary); }
        
        .history { max-width: 380px; margin: 20px auto; }
        .h-item { background: white; padding: 12px; border-radius: 12px; margin-bottom: 10px; display: flex; font-size: 13px; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .h-date { color: #ccc; border-right: 1px solid #eee; padding-right: 10px; margin-right: 10px; }
        .h-detail { flex: 1; }
        .badge { font-size: 10px; padding: 2px 8px; border-radius: 5px; margin-left: 5px; }
        .pass { background: #d4edda; color: #155724; }
        .fail { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div id="app">
    <div id="loader" style="text-align:center; padding: 50px;">⏳ กำลังโหลด...</div>

    <div id="main-content" style="display:none;">
        <div class="id-card">
            <div class="header">
                <h2>STAFF IDENTITY CARD</h2>
                <p>PAPERLESS 2028 | TTSBKK E&I SECTION</p>
            </div>
            
            <div class="profile-area" onclick="document.getElementById('fileIn').click()">
                <div class="img-box">
                    <img id="u-photo" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
                </div>
                <div class="cam-icon">📷</div>
            </div>
            <input type="file" id="fileIn" style="display:none" accept="image/*" onchange="uploadImage(this)">

            <div class="user-info">
                <h3 id="u-name">-</h3>
                <span id="u-dept">-</span>
            </div>
            
            <div class="stats">
                <div class="stat-item"><span class="stat-label">STAFF ID</span><span class="stat-val" id="u-id">-</span></div>
                <div class="stat-item"><span class="stat-label">TOTAL COINS</span><span class="stat-val" id="u-score" style="color:var(--gold)">0</span></div>
            </div>
        </div>

        <div class="history">
            <p style="font-weight: 600; color: #555;">📊 ประวัติภารกิจ</p>
            <div id="history-list"></div>
        </div>
        <button onclick="liff.closeWindow()" style="width:100%; padding:15px; border:none; background:#ccc; border-radius:10px; font-weight:600;">ปิดหน้าต่าง</button>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzGmlyNMgaW9ZoVsCe620CmDi7b1dH8G1C9BOWx8-1LQV0Tx6siNxU6m2dqRqqHhf4s9Q/exec";
    let userId = "";

    async function init() {
        await liff.init({ liffId: "YOUR_LIFF_ID" });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const profile = await liff.getProfile();
        userId = profile.userId;
        loadData();
    }

    async function loadData() {
        const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'getProfile', userId: userId }) });
        const result = await res.json();
        
        if (result.status === 'success') {
            document.getElementById('u-name').innerText = result.data.name;
            document.getElementById('u-id').innerText = result.data.empId;
            document.getElementById('u-dept').innerText = result.data.dept;
            document.getElementById('u-score').innerText = result.data.score;
            if(result.data.photo) document.getElementById('u-photo').src = result.data.photo;
            
            loadHistory();
            document.getElementById('loader').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        } else {
            alert("ไม่พบข้อมูลสมาชิก กรุณาลงทะเบียนผ่านระบบ");
        }
    }

    async function uploadImage(input) {
        if (!input.files[0]) return;
        const photo = document.getElementById('u-photo');
        photo.style.opacity = "0.3";
        
        const reader = new FileReader();
        reader.onload = async function(e) {
            const res = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'uploadImage', userId: userId, base64: e.target.result })
            });
            const data = await res.json();
            if(data.status === 'success') {
                photo.src = data.imageUrl;
                alert("อัปเดตรูปโปรไฟล์แล้ว!");
            }
            photo.style.opacity = "1";
        };
        reader.readAsDataURL(input.files[0]);
    }

    async function loadHistory() {
        const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'getHistory', userId: userId }) });
        const result = await res.json();
        const list = document.getElementById('history-list');
        list.innerHTML = "";
        result.data.forEach(h => {
            list.innerHTML += `
                <div class="h-item">
                    <div class="h-date">${h.date}</div>
                    <div class="h-detail">
                        <div>${h.reason}</div>
                        <div style="font-weight:bold; color:orange">${h.score} Coins <span class="badge ${h.status === 'ผ่าน' ? 'pass' : 'fail'}">${h.status}</span></div>
                    </div>
                </div>`;
        });
    }

    window.onload = init;
</script>
</body>
</html>
