<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Safety Quest Profile</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #0056b3; --gold: #f39c12; --bg: #f0f2f5; }
    body { font-family: 'Prompt', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
    .container { width: 100%; max-width: 400px; }
    
    /* ID Card Design */
    .id-card { background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
    
    /* 🔵 ขยายแถบสีน้ำเงินให้กว้างขึ้น */
    .card-header { 
      background: var(--primary); 
      color: white; 
      padding: 50px 20px 70px 20px; /* เพิ่มพื้นที่ด้านบนและล่าง */
      text-align: center; 
    }
    .card-header .brand { font-size: 11px; opacity: 0.8; letter-spacing: 1px; margin-bottom: 5px; }
    .card-header .title { font-weight: 600; font-size: 18px; }

    .profile-img { 
      width: 105px; 
      height: 105px; 
      background: #fff; 
      border-radius: 50%; 
      margin: -55px auto 10px; /* ขยับขึ้นไปทับแถบสีน้ำเงิน */
      border: 6px solid white; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      overflow: hidden; 
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .profile-img img { width: 65%; opacity: 0.8; }
    
    .user-name { font-size: 22px; font-weight: 600; text-align: center; margin: 10px 0 5px; color: #333; }
    .user-dept { text-align: center; font-size: 13px; color: #666; background: #f0f2f5; width: fit-content; margin: 0 auto 20px; padding: 5px 18px; border-radius: 20px; }
    
    .stats { display: flex; border-top: 1px solid #f0f2f5; }
    .stat-box { flex: 1; padding: 20px; text-align: center; border-right: 1px solid #f0f2f5; }
    .stat-box:last-child { border-right: none; }
    .stat-label { font-size: 11px; color: #999; text-transform: uppercase; margin-bottom: 5px; display: block; }
    .stat-val { font-size: 20px; font-weight: bold; color: var(--primary); }

    /* History List */
    .h-title { margin: 25px 0 15px; font-size: 16px; color: #444; font-weight: 600; display: flex; align-items: center; }
    .q-item { background: white; border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; align-items: flex-start; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .q-date { font-size: 11px; color: #bbb; padding-right: 15px; border-right: 1px solid #f0f2f5; margin-right: 15px; min-width: 40px; text-align: center; padding-top: 5px; }
    .q-info { flex: 1; }
    .q-reason { font-size: 13px; color: #555; line-height: 1.5; margin-bottom: 5px; }
    .q-score { font-size: 14px; font-weight: bold; color: var(--gold); display: flex; align-items: center; }
    .badge { font-size: 10px; padding: 2px 10px; border-radius: 10px; margin-left: 8px; font-weight: 400; }
    .pass { background: #e6ffed; color: #28a745; }
    .fail { background: #ffeef0; color: #dc3545; }
    
    .btn-close { width: 100%; margin-top: 15px; padding: 12px; border: none; border-radius: 12px; background: #e0e0e0; color: #333; font-weight: 600; cursor: pointer; }
  </style>
</head>
<body>

<div class="container">
  <div id="loader" style="text-align: center; margin-top: 50px;">⏳ กำลังโหลด...</div>

  <div id="profile-section" style="display:none;">
    <div class="id-card">
      <div class="card-header">
        <div class="brand">THAI TORAY SYNTHETICS CO., LTD.</div>
        <div class="title">STAFF IDENTITY CARD</div>
      </div>
      <div class="profile-img"><img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"></div>
      <div class="user-name" id="disp-name">-</div>
      <div class="user-dept" id="disp-dept">-</div>
      <div class="stats">
        <div class="stat-box"><span class="stat-label">ID CARD</span><span class="stat-val" id="disp-empId">-</span></div>
        <div class="stat-box"><span class="stat-label">COINS</span><span class="stat-val" id="disp-score" style="color: var(--gold);">0</span></div>
      </div>
    </div>

    <div class="h-title">📊 ประวัติภารกิจล่าสุด</div>
    <div id="history-list"></div>
    <button class="btn-close" onclick="liff.closeWindow()">ปิดหน้าต่าง</button>
  </div>

<div id="register-section" style="display:none; background:white; padding:30px; border-radius:25px; text-align:center; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
    <h3 style="color: var(--primary);">📝 ลงทะเบียนพนักงาน</h3>
    
    <input type="text" id="empId" placeholder="รหัสพนักงาน" style="width:100%; padding:12px; margin-bottom:12px; border:1px solid #ddd; border-radius:10px; box-sizing: border-box;">
    
    <input type="text" id="name" placeholder="ชื่อ-นามสกุล เช่น (นายสมชาย ใจดี)" style="width:100%; padding:12px; margin-bottom:12px; border:1px solid #ddd; border-radius:10px; box-sizing: border-box;">
    
    <!-- เพิ่มช่องเลือกหน่วยงานตรงนี้ -->
    <select id="dept" style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #ddd; border-radius:10px; box-sizing: border-box; font-family: 'Prompt', sans-serif; color: #555;">
      <option value="" disabled selected>-- เลือกหน่วยงาน --</option>
      <option value="E&I">E&I</option>
      <option value="M&U">M&U</option>
      <option value="SE">SE</option>
      <option value="ADM">ADM</option>
    </select>
    </select>

    <button onclick="submitForm()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight: bold;">บันทึกข้อมูล</button>
  </div>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbzM5bUfqns4iu6E9_tXt6efBXDsOso61oBAFxinWbHWDRhL_jFrr3SlFWNI0Ek6bYMCZw/exec";
  let uId = "";

  async function init() {
    await liff.init({ liffId: "2009930455-BQ1aMLq6" });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    const p = await liff.getProfile();
    uId = p.userId;
    fetchProfile();
  }

  async function fetchProfile() {
    const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'getProfile', userId: uId }) });
    const result = await res.json();
    document.getElementById('loader').style.display = 'none';
    if (result.status === 'success') {
      document.getElementById('disp-name').innerText = result.data.name;
      document.getElementById('disp-empId').innerText = result.data.empId;
      document.getElementById('disp-dept').innerText = result.data.dept;
      document.getElementById('disp-score').innerText = result.data.score;
      document.getElementById('profile-section').style.display = 'block';
      fetchHistory();
    } else {
      document.getElementById('register-section').style.display = 'block';
    }
  }

  async function fetchHistory() {
    const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'getHistory', userId: uId }) });
    const result = await res.json();
    const list = document.getElementById('history-list');
    list.innerHTML = result.data.length ? "" : "<p style='text-align:center; font-size:12px; color:#999;'>ยังไม่มีประวัติ</p>";
    result.data.forEach(q => {
      list.innerHTML += `
        <div class="q-item">
          <div class="q-date">${q.date}</div>
          <div class="q-info">
            <div class="q-reason">${q.reason}</div>
            <div class="q-score">${q.score} Coins <span class="badge ${q.status === 'ผ่าน' ? 'pass' : 'fail'}">${q.status}</span></div>
          </div>
        </div>`;
    });
  }

  async function submitForm() {
    const e = document.getElementById('empId').value;
    const n = document.getElementById('name').value;
    const d = document.getElementById('dept').value; // ดึงค่าจากช่อง Dropdown ที่เราเพิ่งเพิ่ม

    // เช็กว่ากรอกข้อมูลครบไหม (รหัส, ชื่อ, หน่วยงาน)
    if(!e || !n || !d) {
      return alert("กรุณากรอกข้อมูลและเลือกหน่วยงานให้ครบถ้วน");
    }

    // เปลี่ยนจาก dept: 'E&I' แบบฝังตายตัว เป็น dept: d ที่ผู้ใช้เลือกมา
    await fetch(GAS_URL, { 
      method: 'POST', 
      body: JSON.stringify({ action: 'register', userId: uId, empId: e, name: n, dept: d }) 
    });
    
    location.reload();
  }
  window.onload = init;
</script>
</body>
</html>
