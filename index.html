<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Safety Quest Profile</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #0056b3; --gold: #f39c12; }
    body { font-family: 'Prompt', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
    .container { width: 100%; max-width: 380px; }
    
    /* ID Card Style */
    .id-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 8px solid var(--primary); }
    .card-header { background: var(--primary); color: white; padding: 20px; text-align: center; }
    .profile-img { width: 90px; height: 90px; background: #fff; border-radius: 50%; margin: -45px auto 10px; border: 4px solid #f0f2f5; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .profile-img img { width: 60%; opacity: 0.7; }
    .user-name { font-size: 20px; font-weight: 600; text-align: center; margin: 5px 0; color: #333; }
    .user-dept { text-align: center; font-size: 13px; color: #666; background: #f8f9fa; width: fit-content; margin: 0 auto 15px; padding: 4px 15px; border-radius: 20px; }
    
    .stats { display: flex; border-top: 1px solid #eee; }
    .stat-box { flex: 1; padding: 15px; text-align: center; border-right: 1px solid #eee; }
    .stat-box:last-child { border-right: none; }
    .stat-label { font-size: 11px; color: #999; text-transform: uppercase; display: block; }
    .stat-val { font-size: 18px; font-weight: bold; color: var(--primary); }

    /* History List */
    .h-title { margin: 25px 0 10px; font-size: 15px; color: #555; font-weight: 600; }
    .q-item { background: white; border-radius: 12px; padding: 12px; margin-bottom: 8px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .q-date { font-size: 11px; color: #bbb; padding-right: 12px; border-right: 1px solid #eee; margin-right: 12px; text-align: center; }
    .q-info { flex: 1; }
    .q-reason { font-size: 13px; color: #444; margin-bottom: 2px; }
    .q-score { font-size: 12px; font-weight: bold; color: var(--gold); }
    .badge { font-size: 9px; padding: 2px 8px; border-radius: 8px; margin-left: 5px; }
    .pass { background: #e6ffed; color: #28a745; }
    .fail { background: #ffeef0; color: #dc3545; }
  </style>
</head>
<body>

<div class="container">
  <div id="loader" style="text-align: center; margin-top: 50px;">⏳ กำลังโหลด...</div>

  <div id="profile-section" style="display:none;">
    <div class="id-card">
      <div class="card-header">
        <div style="font-size: 12px; opacity: 0.8;">PAPERLESS 2028 | TTSBKK</div>
        <div style="font-weight: 600; margin-top: 5px;">STAFF IDENTITY CARD</div>
      </div>
      <div class="profile-img"><img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"></div>
      <div class="user-name" id="disp-name">-</div>
      <div class="user-dept" id="disp-dept">-</div>
      <div class="stats">
        <div class="stat-box"><span class="stat-label">ID CARD</span><span class="stat-val" id="disp-empId">-</span></div>
        <div class="stat-box"><span class="stat-label">COINS</span><span class="stat-val" id="disp-score" style="color: var(--gold);">0</span></div>
      </div>
    </div>

    <div class="h-title">📊 ประวัติภารกิจล่าสุด</div>
    <div id="history-list"></div>
    <button onclick="liff.closeWindow()" style="width:100%; margin-top:15px; padding:10px; border:none; border-radius:10px; background:#ddd;">ปิดหน้าต่าง</button>
  </div>

  <div id="register-section" style="display:none; background:white; padding:25px; border-radius:20px; text-align:center;">
    <h3>📝 ลงทะเบียนพนักงาน</h3>
    <input type="text" id="empId" placeholder="รหัสพนักงาน" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
    <input type="text" id="name" placeholder="ชื่อ-นามสกุล" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
    <button onclick="submitForm()" style="width:100%; padding:10px; background:var(--primary); color:white; border:none; border-radius:8px;">บันทึกข้อมูล</button>
  </div>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbyqQbyQbnuc1cyTZLvUq1gK8LK-q7nWi90EHJfcxiMSBerO-TQ8mAoEYwtiM3zaUWc/exec";
  let uId = "";

  async function init() {
    await liff.init({ liffId: "2009930455-BQ1aMLq6" });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    const p = await liff.getProfile();
    uId = p.userId;
    fetchProfile();
  }

  async function fetchProfile() {
    const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'getProfile', userId: uId }) });
    const result = await res.json();
    document.getElementById('loader').style.display = 'none';
    if (result.status === 'success') {
      document.getElementById('disp-name').innerText = result.data.name;
      document.getElementById('disp-empId').innerText = result.data.empId;
      document.getElementById('disp-dept').innerText = result.data.dept;
      document.getElementById('disp-score').innerText = result.data.score;
      document.getElementById('profile-section').style.display = 'block';
      fetchHistory();
    } else {
      document.getElementById('register-section').style.display = 'block';
    }
  }

  async function fetchHistory() {
    const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'getHistory', userId: uId }) });
    const result = await res.json();
    const list = document.getElementById('history-list');
    list.innerHTML = result.data.length ? "" : "<p style='text-align:center; font-size:12px; color:#999;'>ยังไม่มีประวัติ</p>";
    result.data.forEach(q => {
      list.innerHTML += `
        <div class="q-item">
          <div class="q-date">${q.date.split('/').slice(0,2).join('/')}</div>
          <div class="q-info">
            <div class="q-reason">${q.reason}</div>
            <div class="q-score">${q.score} Coins <span class="badge ${q.status === 'ผ่าน' ? 'pass' : 'fail'}">${q.status}</span></div>
          </div>
        </div>`;
    });
  }

  async function submitForm() {
    const e = document.getElementById('empId').value;
    const n = document.getElementById('name').value;
    if(!e || !n) return alert("กรุณากรอกข้อมูล");
    await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'register', userId: uId, empId: e, name: n, dept: 'E&I' }) });
    location.reload();
  }

  window.onload = init;
</script>
</body>
</html>
